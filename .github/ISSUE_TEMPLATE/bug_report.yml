name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: "1. Go to... 2. Click... 3. See error"
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (blocking)
        - Major (significant)
        - Minor (annoyance)
        - Cosmetic (visual)
    validations:
      required: true
